name: Docker Build & Push

on:
  push:
    branches: [main, staging]

concurrency:
  group: qfc-pets-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: qfc-network/qfc-pets

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch @qfc/chain-sdk
        run: |
          git clone --depth 1 https://github.com/qfc-network/qfc-chain-sdk.git qfc-chain-sdk
          sed -i 's|"file:../qfc-chain-sdk"|"file:./qfc-chain-sdk"|' package.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-sha-${{ github.sha }}

      - name: Dispatch qfc-testnet image tag update
        if: github.ref_type == 'branch'
        env:
          SHORT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          TAG="${BRANCH}-sha-${SHORT_SHA:0:7}"
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TESTNET_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/qfc-network/qfc-testnet/dispatches \
            -d "{\"event_type\":\"image-published\",\"client_payload\":{\"service\":\"qfc-pets\",\"tag\":\"${TAG}\",\"branch\":\"${BRANCH}\",\"sha\":\"${{ github.sha }}\"}}"
          echo "Dispatched qfc-testnet update: ${TAG}"
