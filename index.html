<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QFC AI Pets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a1a;
      --bg2: #12122a;
      --bg3: #1a1a3a;
      --text: #e0e0ff;
      --text2: #8888bb;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #app {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--bg3);
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav { display: flex; gap: 8px; }

    nav button {
      background: var(--bg2);
      color: var(--text2);
      border: 1px solid var(--bg3);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    nav button:hover, nav button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .pet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .pet-card {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .pet-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.2);
    }

    .pet-emoji {
      font-size: 4rem;
      display: inline-block;
      animation: bounce 2s ease-in-out infinite;
    }

    .pet-emoji-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      position: relative;
    }

    .mood-indicator {
      position: absolute;
      bottom: -2px;
      right: -2px;
      font-size: 1.5rem;
      background: var(--bg2);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .level-badge {
      position: absolute;
      top: -2px;
      left: -2px;
      background: var(--accent);
      color: white;
      font-size: 0.7rem;
      font-weight: bold;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pet-name {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .pet-species {
      color: var(--text2);
      font-size: 0.8rem;
      margin-bottom: 8px;
    }

    .personality-tags {
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      background: var(--bg3);
      color: var(--text2);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
    }

    .stat-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
      font-size: 0.75rem;
    }

    .stat-bar label { width: 60px; text-align: right; color: var(--text2); }

    .stat-bar-track {
      flex: 1;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .stat-bar-fill.hp { background: var(--green); }
    .stat-bar-fill.hunger { background: var(--yellow); }
    .stat-bar-fill.energy { background: var(--blue); }
    .stat-bar-fill.happiness { background: var(--accent2); }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn:hover { background: var(--accent2); transform: scale(1.02); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn.secondary { background: var(--bg3); }
    .btn.secondary:hover { background: var(--bg2); }
    .btn.danger { background: var(--red); }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 16px 0; }

    .detail-view { max-width: 600px; margin: 0 auto; }

    .detail-header {
      text-align: center;
      padding: 20px;
      background: var(--bg2);
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .detail-header .pet-emoji { font-size: 5rem; }
    .detail-header .pet-emoji-circle { width: 130px; height: 130px; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: var(--bg2);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }

    .stat-item span:first-child { color: var(--text2); }
    .stat-item span:last-child { font-weight: 600; }

    .chat-container {
      background: var(--bg2);
      border-radius: 16px;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .chat-messages {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      max-width: 80%;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .chat-bubble.pet {
      background: var(--bg3);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .chat-bubble.user {
      background: var(--accent);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .chat-input {
      display: flex;
      gap: 8px;
    }

    .chat-input input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--bg3);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      outline: none;
    }

    .chat-input input:focus { border-color: var(--accent); }

    .breed-view {
      max-width: 700px;
      margin: 0 auto;
    }

    .breed-select {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .breed-select .heart { font-size: 2rem; text-align: center; }

    .breed-pet-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .breed-pet-option {
      background: var(--bg2);
      border: 2px solid var(--bg3);
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .breed-pet-option:hover { border-color: var(--accent); }
    .breed-pet-option.selected { border-color: var(--accent); background: rgba(124, 58, 237, 0.1); }
    .breed-pet-option.disabled { opacity: 0.4; cursor: not-allowed; }

    .child-preview {
      background: var(--bg2);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      border: 2px dashed var(--bg3);
    }

    .battle-view {
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }

    .battle-arena {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      align-items: center;
      margin: 20px 0;
    }

    .battle-pet {
      background: var(--bg2);
      border-radius: 16px;
      padding: 20px;
    }

    .battle-vs {
      font-size: 2rem;
      font-weight: bold;
      color: var(--red);
    }

    .battle-log {
      background: var(--bg2);
      border-radius: 12px;
      padding: 16px;
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
      margin: 16px 0;
    }

    .battle-log-entry {
      padding: 4px 0;
      font-size: 0.85rem;
      color: var(--text2);
      border-bottom: 1px solid var(--bg3);
    }

    .battle-log-entry:last-child { border-bottom: none; }
    .battle-log-entry.damage { color: var(--red); }
    .battle-log-entry.winner { color: var(--green); font-weight: 600; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }

    .empty-state .emoji { font-size: 4rem; margin-bottom: 12px; }

    .sleeping-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 26, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      font-size: 1.5rem;
    }

    .section-title {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: var(--text);
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 12px;
      padding: 4px 0;
    }

    .back-btn:hover { color: var(--text); }

    .element-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .element-fire { background: #7f1d1d; color: #fca5a5; }
    .element-water { background: #1e3a5f; color: #93c5fd; }
    .element-earth { background: #365314; color: #bef264; }
    .element-lightning { background: #713f12; color: #fde047; }
    .element-shadow { background: #3b0764; color: #d8b4fe; }

    .gen-badge {
      font-size: 0.65rem;
      color: var(--text2);
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 6px;
    }

    .adopt-card {
      background: var(--bg2);
      border: 2px dashed var(--accent);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    .adopt-card:hover {
      background: rgba(124, 58, 237, 0.1);
      transform: translateY(-4px);
    }

    .adopt-card .plus { font-size: 3rem; color: var(--accent); margin-bottom: 8px; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.3s ease; }

    .train-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .train-btn {
      background: var(--bg3);
      border: 1px solid transparent;
      color: var(--text);
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .train-btn:hover { border-color: var(--accent); background: rgba(124, 58, 237, 0.1); }
    .train-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .xp-bar {
      width: 100%;
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      margin: 6px 0;
    }

    .xp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg3);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      z-index: 999;
      animation: fadeIn 0.3s ease;
      border: 1px solid var(--accent);
    }
  </style>
</head>
<body>
  <div id="chain-bar" style="position:fixed;top:0;left:0;right:0;height:32px;background:#0a0a14;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:0.75rem;color:#666;z-index:100;border-bottom:1px solid #1a1a2e;">
    <span>QFC Testnet ⛓️ Block <span id="chain-block">#---</span></span>
    <div>
      <span id="wallet-info" style="display:none;margin-right:8px;color:#6e6;"><span id="wallet-addr"></span> | <span id="wallet-bal"></span> QFC</span>
      <button id="btn-connect-wallet" style="padding:2px 10px;border:1px solid #444;border-radius:4px;background:#12122a;color:#aaa;cursor:pointer;font-size:0.75rem;">🔗 Connect Wallet</button>
    </div>
  </div>
  <div id="app" style="margin-top:32px;"></div>
  <script type="module" src="/client/main.ts"></script>
</body>
</html>
